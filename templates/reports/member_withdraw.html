{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
<h3>Member Withdraw Report</h3>

<form method="POST" class="card p-3 mb-3">
    <div class="row">
        <div class="col-md-3">
            <label>From Date</label>
            <input type="date" name="from_date" class="form-control" value="{{ from_date }}">
        </div>
        <div class="col-md-3">
            <label>To Date</label>
            <input type="date" name="to_date" class="form-control" value="{{ to_date }}">
        </div>
        <div class="col-md-2 mt-4">
            <button class="btn btn-danger">Generate</button>
        </div>
    </div>
</form>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Member Code</th>
<th>Name</th>
<th>Mobile</th>
<th>Center</th>
<th>Status</th>
</tr>
</thead>

<tbody>
{% for r in rows %}
<tr>
<td>{{r.member_code}}</td>
<td>{{r.full_name}}</td>
<td>{{r.phone1}}</td>
<td>{{r.center_name}}</td>
<td>{{r.status}}</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>
{% endblock %}
