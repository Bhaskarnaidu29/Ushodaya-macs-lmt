{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
<h3>Savings Passbook</h3>

<form method="POST" class="card p-3 mb-3">
    <div class="row">
        <div class="col-md-4">
            <label>Member Code</label>
            <input type="text" name="member_code" class="form-control" value="{{ member_code }}" placeholder="Enter Member Code">
        </div>
        <div class="col-md-2 mt-4">
            <button class="btn btn-success">Search</button>
        </div>
    </div>
</form>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Due Date</th>
<th>Savings Due</th>
<th>Savings Paid</th>
<th>Additional Savings</th>
<th>Balance</th>
</tr>
</thead>

<tbody>
{% for r in rows %}
<tr>
<td>{{r.duedate}}</td>
<td>{{r.savingsdueamount}}</td>
<td>{{r.savingspaidamount}}</td>
<td>{{r.additionalsavingspaidamount}}</td>
<td>{{r.balance}}</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>
{% endblock %}
