<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ushodaya MACS Ltd</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c2a78 0%, #1857c9 60%, #667eea 100%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 16px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.35);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .login-header {
            background: linear-gradient(135deg, #0c2a78, #1857c9);
            color: white;
            padding: 36px 40px 30px;
            text-align: center;
        }

        .logo-circle {
            width: 88px; height: 88px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }

        .logo-circle img {
            width: 72px; height: 72px;
            border-radius: 50%; object-fit: cover;
        }

        .login-header h2 {
            font-size: 1.55rem; font-weight: 700; margin-bottom: 4px;
        }

        .login-header p {
            font-size: 0.88rem; opacity: 0.88; margin: 0;
        }

        /* ── Body ── */
        .login-body {
            padding: 36px 40px 28px;
        }

        .form-label {
            font-weight: 600; font-size: 0.88rem; color: #374151; margin-bottom: 6px;
        }

        .input-wrap {
            position: relative; margin-bottom: 18px;
        }

        .input-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #9ca3af; font-size: 1.05rem; pointer-events: none;
        }

        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 11px 42px 11px 40px;
            font-size: 0.93rem;
            transition: border-color .2s, box-shadow .2s;
            width: 100%;
        }

        .form-control:focus {
            border-color: #0c2a78;
            box-shadow: 0 0 0 3px rgba(12,42,120,0.12);
            outline: none;
        }

        .toggle-pw {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: #9ca3af; cursor: pointer; font-size: 1.05rem;
            padding: 2px 4px;
        }

        .toggle-pw:hover { color: #0c2a78; }

        .btn-login {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            background: linear-gradient(135deg, #0c2a78, #1857c9);
            border: none;
            color: white;
            cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 6px;
        }

        .btn-login:hover {
            opacity: 0.93;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(12,42,120,0.35);
        }

        .btn-login:active { transform: translateY(0); }

        .alert {
            border-radius: 10px;
            border: none;
            font-size: 0.88rem;
            margin-bottom: 18px;
            padding: 10px 14px;
        }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            padding: 14px 40px 18px;
            background: #f9fafb;
            font-size: 0.78rem;
            color: #9ca3af;
            border-top: 1px solid #f3f4f6;
        }

        @media (max-width: 480px) {
            .login-body, .login-header { padding-left: 24px; padding-right: 24px; }
            .login-footer { padding-left: 24px; padding-right: 24px; }
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Header -->
        <div class="login-header">
            <div class="logo-circle">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo"
                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2272%22 height=%2272%22%3E%3Ccircle cx=%2236%22 cy=%2236%22 r=%2234%22 fill=%22%230c2a78%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2232%22 font-weight=%22bold%22 text-anchor=%22middle%22 dy=%22.35em%22 fill=%22%23fff%22%3EUM%3C/text%3E%3C/svg%3E'">
            </div>
            <h2>Ushodaya MACS Ltd</h2>
            <p>Loan Management System</p>
        </div>

        <!-- Body -->
        <div class="login-body">

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    <i class="bi bi-{% if category == 'danger' %}exclamation-triangle-fill{% elif category == 'success' %}check-circle-fill{% else %}info-circle-fill{% endif %} me-2"></i>
                    {{ message }}
                    <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login.login') }}">

                <!-- Username -->
                <div>
                    <label class="form-label" for="username">Username</label>
                    <div class="input-wrap">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" id="username" name="username"
                               class="form-control" placeholder="Enter your username"
                               required autofocus autocomplete="username">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="Enter your password"
                               required autocomplete="current-password">
                        <button type="button" class="toggle-pw" id="togglePw">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Login to Dashboard
                </button>

            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <i class="bi bi-shield-check me-1"></i> Secure Login &nbsp;|&nbsp;
            &copy; {{ current_year|default(2026) }} Ushodaya MACS Ltd
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('togglePw').addEventListener('click', function () {
        const pw   = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            pw.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });
</script>
</body>
</html>
